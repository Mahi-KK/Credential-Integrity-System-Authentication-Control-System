services:
  mysql:
    image: mysql:8.4
    container_name: password_reuse_mysql
    environment:
      MYSQL_DATABASE: password_reuse_db
      MYSQL_USER: password_reuse_user
      MYSQL_PASSWORD: password_reuse_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  mysql_data:
